<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Town - Part 1</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#111;
font-family:sans-serif;
}

.scene{

position:relative;
width:100vw;
height:100vh;
overflow:hidden;

background:
linear-gradient(
180deg,
#5bc6ff 0%,
#8bdfff 30%,
#ffc5d7 72%,
#ffd9b0 100%
);

}

/* ---------- SUN ---------- */

.sun{

position:absolute;

width:220px;
height:220px;

left:50%;
top:72%;

transform:translate(-50%,-50%);

border-radius:50%;

background:

radial-gradient(circle,
#fff9dd 0%,
#ffe6a8 30%,
#ffbe73 70%,
transparent 100%);

filter:blur(10px);

opacity:.9;

}

/* ---------- CLOUDS ---------- */

.cloud{

position:absolute;

background:white;

opacity:.25;

border-radius:50px;

filter:blur(2px);

animation:cloudMove linear infinite;

}

.cloud:before,
.cloud:after{

content:"";

position:absolute;

background:white;

border-radius:50%;

}

.cloud1{

width:180px;
height:60px;

top:12%;
left:-250px;

animation-duration:35s;

}

.cloud1:before{

width:80px;
height:80px;

left:20px;
top:-30px;

}

.cloud1:after{

width:90px;
height:90px;

right:20px;
top:-35px;

}

.cloud2{

width:220px;
height:70px;

top:28%;
left:-400px;

animation-duration:50s;

}

.cloud2:before{

width:90px;
height:90px;

left:25px;
top:-25px;

}

.cloud2:after{

width:100px;
height:100px;

right:30px;
top:-35px;

}

@keyframes cloudMove{

from{

transform:translateX(0);

}

to{

transform:translateX(160vw);

}

}

/* ---------- MOUNTAINS ---------- */

.mountains{

position:absolute;

bottom:28%;

width:100%;
height:260px;

background:

polygon(0 100%);

}

.mountains::before{

content:"";

position:absolute;

width:100%;
height:100%;

background:

linear-gradient(#6d8e76,#526c5a);

clip-path:polygon(
0 100%,
10% 45%,
18% 65%,
28% 20%,
40% 70%,
52% 28%,
64% 75%,
76% 30%,
88% 65%,
100% 40%,
100% 100%
);

}

/* ---------- ROAD ---------- */

.road{

position:absolute;

bottom:-5%;

left:50%;

transform:translateX(-50%);

width:55vw;
height:85vh;

background:#545454;

clip-path:polygon(
10% 100%,
90% 100%,
62% 0,
38% 0
);

box-shadow:
0 0 50px rgba(0,0,0,.5);

}

/* Road Lines */

.road::before{

content:"";

position:absolute;

left:50%;

transform:translateX(-50%);

width:6px;
height:200%;

background:

repeating-linear-gradient(

to bottom,

white 0 35px,

transparent 35px 70px

);

animation:roadMove .8s linear infinite;

}

@keyframes roadMove{

from{

background-position-y:0;

}

to{

background-position-y:70px;

}

}

/* ---------- PARTICLES ---------- */

.star{

position:absolute;

width:3px;
height:3px;

background:white;

border-radius:50%;

opacity:.7;

animation:float linear infinite;

}

@keyframes float{

from{

transform:translateY(0);

opacity:0;

}

20%{

opacity:1;

}

to{

transform:translateY(-100vh);

opacity:0;

}

}

/* ---------- CAMERA ---------- */

.scene{

animation:camera 8s ease-in-out infinite;

}

@keyframes camera{

0%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

100%{

transform:translateY(0);

}

}

.title{

position:absolute;

top:30px;

left:50%;

transform:translateX(-50%);

font-size:28px;

color:white;

letter-spacing:8px;

text-shadow:0 0 20px rgba(255,255,255,.7);

z-index:10;

}

</style>

</head>
<body>

<div class="scene">

<div class="title">
ANIME TOWN
</div>

<div class="sun"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="mountains"></div>

<div class="road"></div>

</div>

<script>

for(let i=0;i<120;i++){

const s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=4+Math.random()*6+"s";

s.style.animationDelay=Math.random()*5+"s";

document.querySelector(".scene").appendChild(s);

}

</script>

  <!-- LEFT SIDE -->

<div class="left-side">

    <div class="sidewalk"></div>

    <div class="building b1">
        <div class="door"></div>

        <div class="windows">
            <span></span><span></span>
            <span></span><span></span>
            <span></span><span></span>
        </div>
    </div>

    <div class="building b2">
        <div class="door"></div>

        <div class="windows">
            <span></span><span></span>
            <span></span><span></span>
            <span></span><span></span>
        </div>
    </div>

    <div class="building b3">
        <div class="door"></div>

        <div class="windows">
            <span></span><span></span>
            <span></span><span></span>
            <span></span><span></span>
        </div>
    </div>

    <div class="tree t1"></div>
    <div class="tree t2"></div>

    <div class="bush bush1"></div>
    <div class="bush bush2"></div>

</div>

</body>
</html>
